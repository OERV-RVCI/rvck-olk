%YAML 1.2
---
$id: http://devicetree.org/schemas/ub/ub,ubc.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: UBC (Unified Bus Controller) platform device

maintainers:
  - Yuhao Xiang <xiangyuhao2@huawei.com>

description: |
  The UBC platform device reported UBC interrupt number and the association
  between the ubc and the interrupt controller.

properties:
  $nodename:
    pattern: "^ubc@[0-9a-f]*"

  compatible:
    const: "ub,ubc"

  interrupts:
    maxItems: 1
    description: |
      The interrupt specifier for the UBC. Used by the msgq of the ub controller.

  index:
    $ref: /schemas/types.yaml#/definitions/uint32
    description: |
      The index of the UBC. This is used to identify the specific UBC
      in a system with multiple UBC devices. Starts from 0.

  msi-parent:
    description: The msi interrupt for the UBC. Used by the ub entity connected
      to UBC.

required:
  - compatible
  - interrupts
  - index
  - msi-parent

unevaluatedProperties: true

examples:
  - |+
    ubc@0 {
        compatible = "ub,ubc";
        #interrupt-cells = <0x3>;
        interrupt-parent = <0x01>;
        interrupts = <0x00 0xcb 0x4>;
        index = <0x00>;
        msi-parent = <&its 0x54c0>;
    };
