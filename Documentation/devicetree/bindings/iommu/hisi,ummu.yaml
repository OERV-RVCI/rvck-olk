%YAML 1.2
---
$id: http://devicetree.org/schemas/iommu/hisi,ummu.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: HiSilicon UMMU Architecture Implementation

maintainers:
  - Jingbin Wu <wujingbin2@huawei.com>

description: |+
  UMMU is an IOMMU device that performs address translation and permission checking
  using DstEID, TokenID, and UBA as input parameters.

properties:
  $nodename:
    pattern: "^ummu@[0-9a-f]*"
  compatible:
    const: ub,ummu
  index:
    $ref: /schemas/types.yaml#/definitions/uint32
    description: |
      UMMU device index. Used to identify a specific UMMU instance in systems
      with multiple UMMU devices.
  msi-parent:
    $ref: /schemas/types.yaml#/definitions/phandle
    description: |
      MSI parent device phandle. Required for MSI interrupt handling.

required:
  - compatible
  - index
  - msi-parent

additionalProperties: false

examples:
  - |+
    ummu@0 {
        compatible = "ub,ummu";
        index = <0x0>;
        msi-parent = <&its>;
    };
